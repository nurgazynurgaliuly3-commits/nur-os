services:
  - type: web
    name: nuros
    env: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NUROS_DEPLOY_MODE
        value: production
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_PROVIDER
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AUTH_EXPOSE_DEV_TOKENS
        value: "false"
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
